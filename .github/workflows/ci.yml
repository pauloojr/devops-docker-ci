name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*, * ,* "
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/devops-docker-ci

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest

      - name: Run lint
        run: flake8 app tests

      - name: Check formatting
        run: black --check app tests

  docker:
    name: Build and Scan Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:${{ github.sha }} \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "0"
          severity: CRITICAL

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/devops-docker-ci

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/devops-docker-ci:latest
          docker push ghcr.io/${{ github.repository_owner }}/devops-docker-ci:${{ github.sha }}
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:$VERSION
            docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest
            docker push $IMAGE_NAME:$VERSION
            docker push $IMAGE_NAME:latest
          fi